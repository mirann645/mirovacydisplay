<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lizard Software - Download Manager</title>
    <style>
        /* Sayfa genel ayarları */
        body {
            background-color: #000000; /* Arka plan siyah */
            color: #ffffff; /* Yazılar beyaz */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        /* Üst Başlık */
        .manager-title {
            font-size: 1rem;
            color: #555555;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        /* Ana Başlık */
        h1 {
            font-size: 2.5rem;
            margin-top: 0;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .credits {
            font-size: 1rem;
            color: #888888;
            margin-bottom: 50px;
            font-style: italic;
        }

        /* Buton Konteyner */
        .download-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 300px;
        }

        /* Genel Buton Stili */
        .download-btn {
            padding: 18px 30px;
            text-decoration: none;
            border-radius: 12px; /* Daha modern karemsi yuvarlak */
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            display: block;
        }

        /* Privacy Display Butonu (Beyaz) */
        .pd-btn {
            background-color: #ffffff;
            color: #000000;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        /* Lizard Optimizer Butonu (Yeşil) */
        .lo-btn {
            background-color: #00E676;
            color: #000000;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.2);
        }

        /* Hover Efektleri */
        .download-btn:hover {
            transform: translateY(-5px);
            filter: brightness(0.9);
        }

        .pd-btn:hover { box-shadow: 0 8px 25px rgba(255, 255, 255, 0.3); }
        .lo-btn:hover { box-shadow: 0 8px 25px rgba(0, 230, 118, 0.4); }

        .download-btn:active { transform: translateY(0); }

        /* Küçük Etiketler */
        .btn-label {
            display: block;
            font-size: 0.7rem;
            margin-bottom: 5px;
            color: #666666;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="manager-title">Lizard Software Download Manager</div>
    <h1>Lizard Suite</h1>
    <div class="credits">developed by LIZARD</div>

    <div class="download-container">
        
        <div>
            <span class="btn-label">Ekran Gizlilik Aracı</span>
            <a href="privacydisplay.apk" class="download-btn pd-btn" download>Privacy Display İndir</a>
        </div>

        <div>
            <span class="btn-label">Sistem Optimizasyon Aracı</span>
            <a href="lizardoptimizer.apk" class="download-btn lo-btn" download>Lizard Optimizer İndir</a>
        </div>

    </div>

</body>
</html>
